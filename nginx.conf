worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    # Increase timeouts for long-running TTS and WebSocket connections
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Temp paths (running as root, but just in case)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    # Allow large audio uploads (voice cloning samples)
    client_max_body_size 50m;

    upstream personaplex {
        server 127.0.0.1:8999;
    }

    upstream qwen3tts {
        server 127.0.0.1:8880;
    }

    server {
        listen 8998;

        # ── Qwen3-TTS routes ──────────────────────────────────
        # OpenAI-compatible TTS API
        location /v1/ {
            proxy_pass http://qwen3tts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # TTS health check
        location /health-tts {
            proxy_pass http://qwen3tts/health;
            proxy_set_header Host $host;
        }

        # TTS docs
        location /tts-docs {
            proxy_pass http://qwen3tts/docs;
            proxy_set_header Host $host;
        }

        # Voice studio (Gradio)
        location /voice-studio {
            proxy_pass http://qwen3tts;
            proxy_set_header Host $host;
        }

        # ── PersonaPlex routes ────────────────────────────────
        # WebSocket chat endpoint
        location /api/chat {
            proxy_pass http://personaplex;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Combined health check (returns 200 if at least PersonaPlex is up)
        location /health {
            proxy_pass http://personaplex/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Default: PersonaPlex static + fallback
        location / {
            proxy_pass http://personaplex;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
